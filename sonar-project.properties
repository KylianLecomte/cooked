# Identifiants — à adapter avec tes vraies valeurs récupérées à l'étape 1
sonar.projectKey=KylianLecomte_cooked
sonar.organization=cooked

# Nom affiché dans l'interface SonarCloud
sonar.projectName=cooked

# Sources à analyser (hors tests)
sonar.sources=apps/api/src,packages/shared/src

# Fichiers de tests
sonar.tests=apps/api/src,apps/api/test
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts

# Rapport de coverage LCOV généré par Vitest
sonar.typescript.lcov.reportPaths=apps/api/coverage/lcov.info

# Exclusions : node_modules, builds, client Prisma généré, fichiers de config
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/generated/**,\
  **/coverage/**,\
  **/*.module.ts,\
  **/main.ts,\
  **/instrument.ts,\
  **/*.mock.ts,\
  **/*.fixture.ts,\
  **/*.seeder.ts,\
  **/*.type.ts,\
  **/mock/**

# Exclusions de couverture : fichiers analysés pour la qualité mais non comptabilisés
# dans le taux de couverture (infra, config, déclarations Zod)
sonar.coverage.exclusions=\
  apps/api/src/auth/auth.ts,\
  apps/api/src/config/**,\
  apps/api/src/prisma/*.ts,\
  apps/api/src/**/*.dto.ts,\
  apps/api/src/**/constant.ts

# Encodage
sonar.sourceEncoding=UTF-8

sonar.qualitygate.wait=true
# Seuil de couverture minimum (Quality Gate)
# SonarCloud a un Quality Gate par défaut — on le configure en P7 quand les tests sont solides
# Pour l'instant on laisse le Quality Gate "Sonar Way" par défaut