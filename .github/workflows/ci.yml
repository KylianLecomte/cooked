name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs en cours si un nouveau commit est poussé sur la même branche
# Évite de consommer des minutes GitHub Actions inutilement
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: cooked_e2e
          POSTGRES_PASSWORD: cooked_dev_e2e
          POSTGRES_DB: cooked_db_e2e
        options: >-
          --health-cmd "pg_isready -U cooked_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Variables d'environnement disponibles pour tous les steps du job
    env:
      # DATABASE_URL fictive pour que prisma generate puisse charger prisma.config.ts
      # prisma generate ne se connecte pas à la BDD — il lit uniquement schema.prisma
      # Sans cette variable, env() de Prisma 7 throw pendant postinstall
      DATABASE_URL: postgresql://cooked_e2e:cooked_dev_e2e@localhost:5432/cooked_db_e2e
      # Les autres variables sont optionnelles pour CI (pas de Redis, pas de Sentry)
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: placeholder
      BETTER_AUTH_SECRET: ci-test-secret-that-is-at-least-32-chars
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # fetch-depth: 0 est nécessaire pour que pnpm turbo puisse accéder à l'historique git
          # Turbo utilise l'historique pour déterminer quels packages ont changé et doivent être lintés/testés

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Lit la version depuis le champ packageManager dans package.json
        # Pas besoin de spécifier la version ici

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          # cache: "pnpm" met en cache ~/.pnpm-store entre les runs
          # Réduit le temps d'install de ~60s à ~10s après le premier run

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        # --frozen-lockfile : échoue si pnpm-lock.yaml est désynchronisé avec package.json
        # Garantit que le CI utilise exactement les versions lockées, jamais de résolution implicite

      - name: Lint
        run: pnpm exec biome ci .
        # Turborepo parallélise le lint sur tous les packages
        # Cache les résultats — si les fichiers n'ont pas changé, le lint n'est pas relancé

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Units tests
        run: pnpm turbo test

      - name: Migrate test DB
        run: pnpm --filter @cooked/api exec prisma migrate deploy --schema=./packages/api/prisma/schema.prisma

      - name: E2E tests
        run: pnpm --filter @cooked/api test:e2e

      - name: Coverage LCOV (pour SonarCloud)
        # On génère le rapport LCOV séparément — passer --coverage à turbo n'est pas fiable
        # On cible uniquement @cooked/api car c'est le seul package avec des tests pour l'instant
        run: pnpm --filter @cooked/api test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # Token créé à l'étape 1 → à ajouter dans les secrets GitHub
          SONAR_HOST_URL: https://sonarcloud.io
